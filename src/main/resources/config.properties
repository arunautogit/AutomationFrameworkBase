# Browser: chrome, firefox, edge
browser=chrome

# Environment URLs
url.qa=https://qa.example.com
url.uat=https://uat.example.com
url.prod=https://www.example.com

# Timeout in seconds
timeout=10

# Headless mode (true/false)
headless=false

# Slack webhook (can be overridden by env variable)
slack.webhook=https://hooks.slack.com/services/XXXX/YYYY/ZZZZ

# Email settings
email.from=automation@yourdomain.com
email.to=qa-team@yourdomain.com
email.smtp.host=smtp.gmail.com
email.smtp.port=587