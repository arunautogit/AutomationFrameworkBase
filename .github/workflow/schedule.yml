name: Scheduled Automation

on:
  schedule:
    - cron: '0 9 * * *'   # 9 AM UTC (adjust to your timezone)
    - cron: '0 13 * * *'  # 1 PM
    - cron: '0 18 * * *'  # 6 PM
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Run tests
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: mvn clean test -Denv=qa
      - name: Generate Allure Report
        if: always()
        run: mvn allure:report
      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ github.run_id }}
          path: test-output/ExtentReport.html
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_id }}
          path: target/site/allure-maven-plugin
      - name: Upload Screenshots & Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ github.run_id }}
          path: |
            test-output/screenshots/
            test-output/videos/
      - name: Generate Weekly/Monthly Reports
        if: always()
        run: mvn exec:java -Dexec.mainClass="com.automation.utils.ReportAggregator"